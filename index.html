<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Misi Bahasa Indonesia - TAWP-Educa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-bg: #0b0e14;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--space-bg);
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .title-font { font-family: 'Orbitron', sans-serif; }

        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: radial-gradient(circle at center, #1b2735 0%, #050505 100%);
        }

        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
            position: relative;
            z-index: 10;
        }

        .hidden-screen { display: none !important; }

        .opt-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: white;
            font-weight: 700;
            padding: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            font-size: 0.7rem;
            text-align: center;
            line-height: 1.2;
        }
        
        @media (min-height: 700px) {
            .opt-btn { height: 55px; font-size: 0.75rem; }
        }

        .opt-btn:active { transform: scale(0.96); }
        .opt-btn.correct { background: #059669 !important; border-color: var(--neon-green) !important; box-shadow: 0 0 15px var(--neon-green); }
        .opt-btn.wrong { background: #dc2626 !important; border-color: var(--neon-red) !important; box-shadow: 0 0 15px var(--neon-red); }

        .rope-container {
            position: relative;
            width: 100%;
            height: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            overflow: hidden;
            border-radius: 15px;
        }

        .rope-laser {
            position: absolute;
            height: 3px;
            width: 200%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-blue));
            box-shadow: 0 0 15px var(--neon-blue);
            left: 50%;
            transform: translateX(-50%);
            transition: left 0.4s ease;
        }

        .rope-marker {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            z-index: 5;
            transition: left 0.4s ease;
        }

        main { 
            flex: 1; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; 
            z-index: 10;
            overflow-y: auto;
        }

        .q-box {
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; 
            margin-bottom: 8px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 10px; 
            width: 100%; 
            height: 60px;
        }

        .themed-footer {
            background: rgba(11, 14, 20, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 243, 255, 0.3);
            padding: 8px 15px;
            z-index: 100;
            flex-shrink: 0;
        }

        .player-card {
            transition: opacity 0.5s ease;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .player-finished {
            opacity: 0.4;
            pointer-events: none;
        }

        #audio-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="stars-container" id="stars-bg"></div>

    <main>
        <!-- Welcome Screen -->
        <div id="screen-welcome" class="glass-panel max-w-sm w-full p-8 text-center">
            <div class="w-20 h-20 bg-cyan-500/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-cyan-400 shadow-lg shadow-cyan-500/20">
                <i class="fas fa-shuttle-space text-3xl text-cyan-400"></i>
            </div>
            <h1 class="title-font text-xl text-cyan-400 uppercase mb-3">MISI BAHASA INDONESIA</h1>
            <p class="text-gray-400 text-[9px] mb-8 uppercase tracking-widest leading-relaxed font-bold">
                KALIMAT ANJURAN, KALIMAT AJAKAN,<br>DAN KALIMAT LARANGAN
            </p>
            <button onclick="initApp()" class="w-full bg-cyan-600 p-4 rounded-xl font-bold uppercase tracking-widest active:scale-95 transition-transform shadow-lg shadow-cyan-500/20">
                MULAI PERMAINAN
            </button>
        </div>

        <!-- Level Selection -->
        <div id="screen-level" class="glass-panel max-w-sm w-full p-6 text-center hidden-screen">
            <h1 class="title-font text-xl text-cyan-400 uppercase mb-4 tracking-wider">PILIH TOPIK</h1>
            <div class="space-y-3">
                <button onclick="selectLevel(1)" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-left hover:bg-white/10 transition-all">
                    <div class="font-bold text-cyan-400 text-xs uppercase">Lengkapi Kalimat</div>
                    <div class="text-[9px] text-gray-400 uppercase">ISI KATA YANG KOSONG</div>
                </button>
                <button onclick="selectLevel(2)" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-left hover:bg-white/10 transition-all">
                    <div class="font-bold text-purple-400 text-xs uppercase">Identifikasi Jenis</div>
                    <div class="text-[9px] text-gray-400 uppercase">TEBAK JENIS KALIMAT</div>
                </button>
            </div>
        </div>

        <!-- Mode Selection -->
        <div id="screen-mode" class="glass-panel max-w-sm w-full p-6 text-center hidden-screen">
            <h1 class="title-font text-lg mb-6 text-purple-400 uppercase">MODE OPERASI</h1>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="selectMode(1)" class="p-4 bg-white/5 border border-white/10 rounded-xl flex items-center justify-between px-6 text-white font-bold text-xs">
                    <span>SOLO PILOT</span> <i class="fas fa-user text-cyan-400"></i>
                </button>
                <button onclick="selectMode(2)" class="p-4 bg-white/5 border border-white/10 rounded-xl flex items-center justify-between px-6 text-white font-bold text-xs">
                    <span>DUEL REAL-TIME (DUO)</span> <i class="fas fa-bolt text-purple-400"></i>
                </button>
                <button onclick="selectMode(3)" class="p-4 bg-cyan-600 border border-cyan-400 rounded-xl flex items-center justify-between px-6 text-white font-bold text-xs shadow-lg active:scale-95">
                    <span>ADU TARIK</span> <i class="fas fa-hand-rock text-yellow-400"></i>
                </button>
            </div>
        </div>

        <!-- Single Game (Solo) -->
        <div id="screen-game-solo" class="glass-panel max-w-sm w-full p-5 text-center hidden-screen">
            <div class="flex justify-between items-center mb-4">
                <div class="bg-cyan-500/20 px-3 py-1 rounded-full text-cyan-400 font-bold text-[10px] uppercase">SOLO PILOT</div>
                <div class="bg-yellow-500/20 px-3 py-1 rounded-full text-yellow-400 font-bold text-[10px] uppercase">SOAL: <span id="solo-num">1</span>/10</div>
            </div>
            <div id="solo-icon" class="q-box"></div>
            <h2 id="solo-text" class="text-white text-sm font-bold mb-6 min-h-[60px] flex items-center justify-center">...</h2>
            <div id="solo-opts" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- Dual Game (Simultaneous) -->
        <div id="screen-game-duel" class="w-full max-w-5xl hidden-screen">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-full">
                <!-- Player 1 Side -->
                <div id="p0-card" class="glass-panel p-4 text-center border-l-4 border-cyan-500 player-card">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-cyan-400 font-bold text-[10px] title-font">PLAYER 1</span>
                            <span class="text-gray-400 text-[9px] font-bold">SOAL: <span id="p0-num">1</span>/10</span>
                        </div>
                        <div id="p0-icon" class="q-box"></div>
                        <h2 id="p0-text" class="text-white text-[11px] font-bold mb-3 min-h-[40px] flex items-center justify-center">...</h2>
                    </div>
                    <div id="p0-opts" class="grid grid-cols-1 gap-2"></div>
                </div>
                <!-- Player 2 Side -->
                <div id="p1-card" class="glass-panel p-4 text-center border-r-4 border-purple-500 player-card">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-purple-400 font-bold text-[10px] title-font">PLAYER 2</span>
                            <span class="text-gray-400 text-[9px] font-bold">SOAL: <span id="p1-num">1</span>/10</span>
                        </div>
                        <div id="p1-icon" class="q-box"></div>
                        <h2 id="p1-text" class="text-white text-[11px] font-bold mb-3 min-h-[40px] flex items-center justify-center">...</h2>
                    </div>
                    <div id="p1-opts" class="grid grid-cols-1 gap-2"></div>
                </div>
            </div>
        </div>

        <!-- Tug of War -->
        <div id="screen-game-tug" class="w-full max-w-4xl hidden-screen flex flex-col items-center">
            <div class="rope-container w-full max-w-2xl mb-4">
                <div class="absolute left-2 text-cyan-400 z-10"><i class="fas fa-trophy text-[10px]"></i></div>
                <div id="tug-rope" class="rope-laser"></div>
                <div id="tug-marker" class="rope-marker"></div>
                <div class="absolute right-2 text-purple-400 z-10"><i class="fas fa-trophy text-[10px]"></i></div>
            </div>
            <div id="tug-container" class="grid grid-cols-1 md:grid-cols-2 gap-3 w-full"></div>
        </div>

        <!-- Result -->
        <div id="screen-result" class="glass-panel max-w-sm w-full p-6 text-center hidden-screen">
            <h1 id="res-title" class="title-font text-xl text-cyan-400 mb-2 uppercase">LAPORAN AKHIR</h1>
            <div id="res-body" class="mb-6 space-y-2"></div>
            <button onclick="resetToMenu()" class="w-full bg-cyan-600 p-3 rounded-xl font-bold uppercase text-xs active:scale-95 transition-transform">KEMBALI KE MARKAS</button>
        </div>
    </main>

    <!-- FOOTER KUSTOM -->
    <footer class="themed-footer w-full">
        <div class="flex flex-col md:flex-row justify-between items-center max-w-5xl mx-auto gap-3">
            <div class="flex items-center gap-5">
                <!-- WhatsApp -->
                <a href="https://wa.me/6281387642599" target="_blank" class="text-green-400 text-base hover:scale-110 transition-transform">
                    <i class="fab fa-whatsapp"></i>
                </a>
                <!-- TikTok -->
                <a href="https://www.tiktok.com/@tofik.afandi" target="_blank" class="text-white text-base hover:scale-110 transition-transform">
                    <i class="fab fa-tiktok"></i>
                </a>
                <!-- Copyright info -->
                <div class="text-[9px] font-bold text-gray-400 flex items-center gap-2">
                    <i class="far fa-copyright"></i> 
                    <span>2026 TAWP-Educa | Modest & Meaningful</span>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="toggleFullscreen()" class="w-7 h-7 rounded bg-white/5 border border-white/10 flex items-center justify-center text-cyan-400 text-[10px]">
                    <i id="fullscreen-icon" class="fas fa-expand"></i>
                </button>
                <button onclick="toggleAudioSettings()" class="w-7 h-7 rounded bg-white/5 border border-white/10 flex items-center justify-center text-white text-[10px]"><i class="fas fa-volume-up"></i></button>
                <button onclick="resetToMenu()" class="w-7 h-7 rounded bg-white/5 border border-white/10 flex items-center justify-center text-red-400 text-[10px]"><i class="fas fa-power-off"></i></button>
            </div>
        </div>
    </footer>

    <div id="audio-overlay">
        <div class="glass-panel max-w-sm w-full p-8 text-center">
            <h2 class="title-font text-cyan-400 mb-6 uppercase">Volume Musik</h2>
            <input type="range" id="music-range" min="0" max="100" value="50" class="w-full mb-8" oninput="updateMusicVol(this.value)">
            <button onclick="toggleAudioSettings()" class="w-full bg-cyan-600 p-3 rounded-xl font-bold uppercase text-xs">Simpan</button>
        </div>
    </div>

    <!-- Audio tracks -->
    <audio id="audio-menu" loop crossorigin="anonymous" src="https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3"></audio>
    <audio id="audio-game" loop crossorigin="anonymous" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c8c8a7315b.mp3"></audio>

    <script>
        let gameMode = 1; 
        let selectedLevel = 1;
        let ropePos = 50; 
        const TOTAL_QUESTIONS = 10;
        
        let questions = [[], []]; 
        let qIndices = [0, 0];
        let processing = [false, false];
        let scores = [0, 0];
        let finishTimes = [0, 0];
        let startTime = 0;
        
        let audioCtx, musicGain, sfxGain, audioInit = false;

        const dataTopik1 = [
            { q: "\"____ kita membersihkan taman sekolah bersama-sama agar terlihat asri!\"", a: "B", o: ["A. Jangan", "B. Ayo", "C. Sebaiknya", "D. Hindari"], k: "AJAKAN" },
            { q: "\"____ kamu memakai payung karena di luar sedang hujan deras.\"", a: "C", o: ["A. Mari", "B. Yuk", "C. Sebaiknya", "D. Dilarang"], k: "ANJURAN" },
            { q: "\"____ membuang sampah plastik ke dalam sungai karena bisa menyebabkan banjir!\"", a: "C", o: ["A. Hendaklah", "B. Mari", "C. Jangan", "D. Ayo"], k: "LARANGAN" },
            { q: "\"____ makan sayur dan buah-buahan supaya badanmu tetap sehat.\"", a: "C", o: ["A. Dilarang", "B. Ayo", "C. Hendaklah", "D. Hindari"], k: "ANJURAN" },
            { q: "\"____ berteriak di dalam ruang kelas karena teman-mana sedang konsentrasi!\"", a: "A", o: ["A. Tidak boleh", "B. Mari", "C. Sebaiknya", "D. Yuk"], k: "LARANGAN" },
            { q: "\"____ berolahraga setiap pagi agar tubuh kita bugar!\"", a: "C", o: ["A. Dilarang", "B. Jangan", "C. Mari", "D. Sebaiknya"], k: "AJAKAN" },
            { q: "\"____ mencuci kaki dan tangan sebelum kamu tidur di kasur.\"", a: "A", o: ["A. Sebaiknya", "B. Ayo", "C. Mari", "D. Tidak boleh"], k: "ANJURAN" },
            { q: "\"____ menyentuh kabel listrik yang terkelupas karena sangat berbahaya!\"", a: "C", o: ["A. Mari", "B. Yuk", "C. Jangan", "D. Hendaklah"], k: "LARANGAN" },
            { q: "\"____ kita pergi ke kantin bersama-sama setelah bel istirahat berbunyi!\"", a: "B", o: ["A. Dilarang", "B. Yuk", "C. Sebaiknya", "D. Jangan"], k: "AJAKAN" },
            { q: "\"____ makanan yang terlalu pedas jika perutmu sedang sakit.\"", a: "A", o: ["A. Hindari", "B. Ayo", "C. Mari", "D. Hendaklah"], k: "LARANGAN" }
        ];

        const dataTopik2 = [
            { q: "\"Mari kita berdoa sebelum makan!\"", a: "B", o: ["A. Kalimat Anjuran", "B. Kalimat Ajakan", "C. Kalimat Larangan"], k: "AJAKAN" },
            { q: "\"Dilarang mencoret-coret dinding sekolah!\"", a: "A", o: ["A. Kalimat Larangan", "B. Kalimat Anjuran", "C. Kalimat Ajakan"], k: "LARANGAN" },
            { q: "\"Sebaiknya kamu merapikan tempat tidur setelah bangun.\"", a: "C", o: ["A. Kalimat Ajakan", "B. Kalimat Larangan", "C. Kalimat Anjuran"], k: "ANJURAN" },
            { q: "\"Jangan bermain korek api, itu berbahaya!\"", a: "A", o: ["A. Kalimat Larangan", "B. Kalimat Ajakan", "C. Kalimat Anjuran"], k: "LARANGAN" },
            { q: "\"Ayo kita belajar kelompok di perpustakaan!\"", a: "B", o: ["A. Kalimat Anjuran", "B. Kalimat Ajakan", "C. Kalimat Larangan"], k: "AJAKAN" },
            { q: "\"Hendaklah kita menghormati orang yang lebih tua.\"", a: "C", o: ["A. Kalimat Ajakan", "B. Kalimat Larangan", "C. Kalimat Anjuran"], k: "ANJURAN" },
            { q: "\"Yuk, kita bantu Ibu mencuci piring!\"", a: "B", o: ["A. Kalimat Larangan", "B. Kalimat Ajakan", "C. Kalimat Anjuran"], k: "AJAKAN" },
            { q: "\"Tidak boleh berbicara saat guru sedang menjelaskan.\"", a: "A", o: ["A. Kalimat Larangan", "B. Kalimat Anjuran", "C. Kalimat Ajakan"], k: "LARANGAN" },
            { q: "\"Sebaiknya kamu datang lebih awal agar tidak terlambat.\"", a: "B", o: ["A. Kalimat Ajakan", "B. Kalimat Anjuran", "C. Kalimat Larangan"], k: "ANJURAN" },
            { q: "\"Hindari berkerumun agar tidak tertular penyakit!\"", a: "A", o: ["A. Kalimat Larangan", "B. Kalimat Ajakan", "C. Kalimat Anjuran"], k: "LARANGAN" }
        ];

        function initApp() { setupAudio(); switchScreen('level'); playMusic('menu'); }

        function setupAudio() {
            if(audioInit) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                musicGain = audioCtx.createGain(); sfxGain = audioCtx.createGain();
                musicGain.connect(audioCtx.destination); sfxGain.connect(audioCtx.destination);
                audioCtx.createMediaElementSource(document.getElementById('audio-menu')).connect(musicGain);
                audioCtx.createMediaElementSource(document.getElementById('audio-game')).connect(musicGain);
                musicGain.gain.value = 0.5; sfxGain.gain.value = 0.7; audioInit = true;
            } catch(e) {}
        }

        function chime(type) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(sfxGain);
            const now = audioCtx.currentTime;
            if(type === 'correct') { 
                o.frequency.setValueAtTime(800, now); o.frequency.exponentialRampToValueAtTime(1200, now + 0.1); 
                g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.3); 
                o.start(); o.stop(now + 0.3); 
            } else { 
                o.type='sawtooth'; o.frequency.setValueAtTime(150, now); 
                g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.4); 
                o.start(); o.stop(now + 0.4); 
            }
        }

        function playMusic(type) {
            if(!audioInit) return;
            const m = document.getElementById('audio-menu'); const g = document.getElementById('audio-game');
            m.pause(); g.pause();
            const t = (type === 'menu') ? m : g; t.currentTime = 0; t.play().catch(() => {});
        }

        function updateMusicVol(v) { if(musicGain) musicGain.gain.value = v / 100; }
        function toggleAudioSettings() { const el = document.getElementById('audio-overlay'); el.style.display = (el.style.display === 'flex') ? 'none' : 'flex'; }
        
        function toggleFullscreen() {
            const icon = document.getElementById('fullscreen-icon');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
                icon.classList.replace('fa-expand', 'fa-compress');
            } else {
                document.exitFullscreen();
                icon.classList.replace('fa-compress', 'fa-expand');
            }
        }

        function getSVG(type) {
            const icons = { 'AJAKAN': 'fa-bullhorn text-cyan-400', 'ANJURAN': 'fa-lightbulb text-yellow-400', 'LARANGAN': 'fa-ban text-red-500' };
            return `<i class="fas ${icons[type] || 'fa-pen'} text-2xl"></i>`;
        }

        function selectLevel(l) { selectedLevel = l; switchScreen('mode'); chime('correct'); }
        function selectMode(m) { gameMode = m; startGame(); }

        function startGame() {
            qIndices = [0, 0]; processing = [false, false]; scores = [0, 0]; finishTimes = [0, 0]; ropePos = 50;
            questions[0] = [...(selectedLevel === 1 ? dataTopik1 : dataTopik2)].sort(() => Math.random() - 0.5);
            questions[1] = [...(selectedLevel === 1 ? dataTopik1 : dataTopik2)].sort(() => Math.random() - 0.5);
            startTime = Date.now();
            playMusic('game');

            if(gameMode === 1) {
                switchScreen('game-solo'); renderSolo();
            } else if(gameMode === 2) {
                document.getElementById('p0-card').classList.remove('player-finished');
                document.getElementById('p1-card').classList.remove('player-finished');
                switchScreen('game-duel'); renderDuel(0); renderDuel(1);
            } else {
                setupTugUI(); switchScreen('game-tug'); updateRopeUI(); renderTug(0); renderTug(1);
            }
        }

        function renderSolo() {
            if(qIndices[0] >= TOTAL_QUESTIONS) { 
                endGame(`<div class='text-cyan-400 font-bold text-lg'>SKOR: ${scores[0]}</div><div class='text-gray-400 text-xs uppercase'>WAKTU: ${((Date.now()-startTime)/1000).toFixed(1)}s</div>`); 
                return; 
            }
            const q = questions[0][qIndices[0]];
            document.getElementById('solo-num').innerText = qIndices[0] + 1;
            document.getElementById('solo-icon').innerHTML = getSVG(q.k);
            document.getElementById('solo-text').innerText = q.q;
            const optBox = document.getElementById('solo-opts'); optBox.innerHTML = '';
            q.o.forEach(o => {
                const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = o;
                b.onclick = () => {
                    if(processing[0]) return; processing[0]=true;
                    const choice = o.split('.')[0].trim();
                    if(choice === q.a) { b.classList.add('correct'); chime('correct'); scores[0]+=10; }
                    else { b.classList.add('wrong'); chime('wrong'); }
                    setTimeout(() => { qIndices[0]++; processing[0]=false; renderSolo(); }, 400);
                };
                optBox.appendChild(b);
            });
        }

        function renderDuel(p) {
            const card = document.getElementById(`p${p}-card`);
            if(qIndices[p] >= TOTAL_QUESTIONS) { 
                finishTimes[p] = Date.now() - startTime;
                card.classList.add('player-finished');
                card.querySelector('h2').innerText = "MISI SELESAI!";
                card.querySelector('div[id$="-opts"]').innerHTML = "<div class='text-green-400 font-bold uppercase text-[9px] animate-pulse py-4'>Menunggu Lawan...</div>";
                if(finishTimes[0] > 0 && finishTimes[1] > 0) processDuelResult();
                return; 
            }
            const q = questions[p][qIndices[p]];
            document.getElementById(`p${p}-num`).innerText = qIndices[p] + 1;
            document.getElementById(`p${p}-icon`).innerHTML = getSVG(q.k);
            document.getElementById(`p${p}-text`).innerText = q.q;
            const optBox = document.getElementById(`p${p}-opts`); optBox.innerHTML = '';
            q.o.forEach(o => {
                const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = o;
                b.onclick = () => {
                    if(processing[p]) return; processing[p]=true;
                    const choice = o.split('.')[0].trim();
                    if(choice === q.a) { b.classList.add('correct'); chime('correct'); scores[p]+=10; }
                    else { b.classList.add('wrong'); chime('wrong'); }
                    setTimeout(() => { qIndices[p]++; processing[p]=false; renderDuel(p); }, 400);
                };
                optBox.appendChild(b);
            });
        }

        function processDuelResult() {
            let winner = "";
            if(scores[0] > scores[1]) winner = "PLAYER 1";
            else if(scores[1] > scores[0]) winner = "PLAYER 2";
            else {
                if(finishTimes[0] < finishTimes[1]) winner = "PLAYER 1 (Kecepatan!)";
                else if(finishTimes[1] < finishTimes[0]) winner = "PLAYER 2 (Kecepatan!)";
                else winner = "SERI";
            }
            endGame(`
                <div class='text-yellow-400 font-bold text-xl mb-4 uppercase'>PEMENANG: ${winner}</div>
                <div class='grid grid-cols-2 gap-4 text-[10px] uppercase font-bold'>
                    <div class='p-3 bg-cyan-500/10 rounded border border-cyan-500/20'>P1: ${scores[0]} pts<br>${(finishTimes[0]/1000).toFixed(1)}s</div>
                    <div class='p-3 bg-purple-500/10 rounded border border-purple-500/20'>P2: ${scores[1]} pts<br>${(finishTimes[1]/1000).toFixed(1)}s</div>
                </div>
            `);
        }

        function setupTugUI() {
            const container = document.getElementById('tug-container'); container.innerHTML = '';
            for(let i=0; i<2; i++) {
                const color = i === 0 ? 'cyan' : 'purple';
                container.innerHTML += `<div class="glass-panel p-3 border border-${color}-500/30">
                    <span class="text-${color}-400 font-bold text-[9px] title-font uppercase">PLAYER ${i+1}</span>
                    <div id="t${i}-icon" class="q-box"></div>
                    <h2 id="t${i}-text" class="text-white text-[10px] font-bold text-center mb-3 min-h-[35px] flex items-center justify-center">...</h2>
                    <div id="t${i}-opts" class="grid grid-cols-1 gap-2"></div>
                </div>`;
            }
        }

        function renderTug(p) {
            const qSet = questions[p]; const q = qSet[qIndices[p] % qSet.length];
            document.getElementById(`t${p}-icon`).innerHTML = getSVG(q.k);
            document.getElementById(`t${p}-text`).innerText = q.q;
            const optBox = document.getElementById(`t${p}-opts`); optBox.innerHTML = '';
            q.o.forEach(o => {
                const b = document.createElement('button'); b.className = 'opt-btn text-[9px] h-[38px]'; b.innerText = o;
                b.onclick = () => {
                    if(processing[p]) return; processing[p]=true;
                    const choice = o.split('.')[0].trim();
                    if(choice === q.a) { b.classList.add('correct'); chime('correct'); ropePos += (p === 0 ? -8 : 8); }
                    else { b.classList.add('wrong'); chime('wrong'); ropePos += (p === 0 ? 8 : -8); }
                    updateRopeUI();
                    if(ropePos <= 5) { endGame("<span class='text-cyan-400'>PLAYER 1 MENANG!</span>"); return; }
                    if(ropePos >= 95) { endGame("<span class='text-purple-400'>PLAYER 2 MENANG!</span>"); return; }
                    setTimeout(() => { qIndices[p]++; processing[p]=false; renderTug(p); }, 400);
                };
                optBox.appendChild(b);
            });
        }

        function updateRopeUI() {
            document.getElementById('tug-rope').style.left = ropePos + '%';
            document.getElementById('tug-marker').style.left = ropePos + '%';
        }

        function endGame(html) { document.getElementById('res-body').innerHTML = html; switchScreen('result'); playMusic('menu'); }
        function switchScreen(id) { document.querySelectorAll('main > div').forEach(s => s.classList.add('hidden-screen')); document.getElementById('screen-' + id).classList.remove('hidden-screen'); }
        function resetToMenu() { switchScreen('welcome'); playMusic('menu'); }

        document.addEventListener('fullscreenchange', () => {
            const icon = document.getElementById('fullscreen-icon');
            if (!document.fullscreenElement) icon.classList.replace('fa-compress', 'fa-expand');
        });

        (function createStars() {
            const bg = document.getElementById('stars-bg');
            for(let i=0; i<60; i++) {
                const s = document.createElement('div'); s.className='star';
                const size = (Math.random()*2+1)+'px'; s.style.width = size; s.style.height = size;
                s.style.top = Math.random()*100+'%'; s.style.left = Math.random()*100+'%';
                s.style.setProperty('--duration', (Math.random()*3+2)+'s'); bg.appendChild(s);
            }
        })();
    </script>
</body>
</html>
